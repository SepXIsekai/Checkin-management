databases:
  - name: checkin-db
    databaseName: checkin_management
    user: checkin_user
    plan: free

services:
  - type: web
    name: checkin-management
    runtime: ruby
    plan: free
    buildCommand: |
      bundle config set --local without 'development test'
      bundle install --clean
      bundle exec rails assets:precompile
      bundle exec rails db:migrate
    startCommand: bundle exec puma -C config/puma.rb
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: checkin-db
          property: connectionString
      - key: RAILS_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false
      - key: SECRET_KEY_BASE
        generateValue: true