# PostgreSQL. Versions 9.3 and up are supported.
#
# Install the pg driver:
#   gem install pg
# On macOS with Homebrew:
#   gem install pg -- --with-pg-config=/usr/local/bin/pg_config
# On Windows:
#   gem install pg
#       Choose the win32 build.
#       Install PostgreSQL and put its /bin directory on your path.
#
# Configure Using Gemfile
# gem "pg"
#
default: &default
  adapter: postgresql
  encoding: unicode
  # For details on connection pooling, see Rails configuration guide
  # https://guides.rubyonrails.org/configuring.html#database-pooling
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV["POSTGRESQL_HOST"] || Rails.application.credentials.dig(:database, :host) %>
  port: <%= ENV["POSTGRESQL_PORT"] || Rails.application.credentials.dig(:database, :port) %>
  username: <%= ENV["POSTGRESQL_USERNAME"] || Rails.application.credentials.dig(:database, :username) %>
  password: <%= ENV["POSTGRESQL_PASSWORD"] || Rails.application.credentials.dig(:database, :password) %>


development:
  <<: *default
  database: checkin_management_development

test:
  <<: *default
  database: checkin_management_test

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>